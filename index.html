<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay May Mắn - GDCD 8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🎡 VÒNG QUAY MAY MẮN 🎡</h1>

        <div class="admin-panel">
            <h3>⚙️ Cài đặt & Quản lý</h3>
            <p>Danh sách học sinh (cách nhau bằng dấu phẩy):</p>
            <textarea id="student-list-input">An, Bình, Chi, Dương, Em, Giang, Hoa, Hải</textarea>
            
            <p>Bộ câu hỏi JSON (Trắc nghiệm hoặc Đúng/Sai):</p>
            <textarea id="json-input" placeholder='Dán mã JSON vào đây...'></textarea>
            
            <div class="control-row">
                <button onclick="importData()">Cập nhật Dữ liệu</button>
                <button onclick="exportSample()">Lấy mẫu JSON</button>
                <button onclick="resetSystem()" style="background:#e67e22">Xóa tất cả</button>
            </div>

            <div class="options">
                <label><input type="checkbox" id="remove-student" checked> Loại bỏ HS trúng</label>
                <label><input type="checkbox" id="no-repeat-q" checked> Không lặp câu hỏi</label>
                <span> | Chế độ: 
                    <input type="radio" name="q-count" value="1" checked> 1 câu 
                    <input type="radio" name="q-count" value="2"> 2 câu
                </span>
            </div>
        </div>

        <div class="play-zone">
            <div class="wheel-box">
                <canvas id="wheelCanvas" width="400" height="400"></canvas>
                <div class="pointer"></div>
                <button id="spin-btn">QUAY SỐ</button>
            </div>
            <div class="info-box">
                <h2 id="student-name">Sẵn sàng!</h2>
                <div id="timer" class="hidden">15s</div>
                <div id="remaining-info">Đang tải...</div>
            </div>
        </div>

        <div id="quiz-container" class="hidden">
            <h2 id="question-text">Câu hỏi?</h2>
            <div id="options-grid"></div>
            <button id="check-btn" class="main-btn">KIỂM TRA ĐÁP ÁN</button>
            <p id="feedback"></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
